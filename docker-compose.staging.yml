version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: hotaly-staging-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: hotaly_prev_staging
    volumes:
      - staging-db-data:/var/lib/postgresql/data
    networks:
      - hotaly-staging-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hotaly-staging-api
    restart: unless-stopped
    ports:
      - "4002:3002"
    environment:
      NODE_ENV: staging
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD}@db:5432/hotaly_prev_staging
      PORT: 3002
      CORS_ORIGIN: ${CORS_ORIGIN}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - hotaly-staging-network
    volumes:
      - ./backend/logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3002/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    container_name: hotaly-staging-web
    restart: unless-stopped
    ports:
      - "4000:3000"
    environment:
      NODE_ENV: staging
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    depends_on:
      - api
    networks:
      - hotaly-staging-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  hotaly-staging-network:
    driver: bridge

volumes:
  staging-db-data:
    driver: local

